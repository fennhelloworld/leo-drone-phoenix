; LeoDrone Phoenix - ESP32-S3 Sensor Node Firmware
[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = espidf

; Serial monitor
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

; Build flags
build_flags = 
    -D CONFIG_BME280_I2C_ADDR=0x76
    -D CONFIG_ICM42688_SPI_FREQ=10000000
    -D CONFIG_WIFI_SSID=\"LeoDrone\"
    -D CONFIG_MAVLINK_BAUD=921600

; Partition table for OTA
board_build.partitions = partitions.csv
